<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboRush — Global Leaderboard</title>
    <meta name="description" content="TurboRush global leaderboard. See the fastest lap times per track.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>">

    <style>
        :root {
            --primary: #00D4FF;
            --primary-glow: rgba(0, 212, 255, 0.4);
            --secondary: #FF4655;
            --accent: #A259FF;
            --bg-dark: #02020a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-glass: rgba(5, 5, 20, 0.85);
            --text-main: #ffffff;
            --text-muted: #8888a8;
            --border-light: rgba(255, 255, 255, 0.08);
            --radius-lg: 32px;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            --blur: blur(20px);
            --gold: #FFD700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            background-color: var(--bg-dark);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            padding-top: 120px;
        }

        h1,
        h2,
        h3,
        .font-heading {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        /* --- Background Blobs --- */
        .blob-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from {
                transform: translate(-10%, -10%);
            }

            to {
                transform: translate(10%, 10%);
            }
        }

        /* --- Utility --- */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: var(--blur);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 40px;
            transition: var(--transition);
        }

        /* --- Navigation --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: var(--bg-glass);
            backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--border-light);
            height: 90px;
            display: flex;
            align-items: center;
        }

        nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: #fff;
        }

        /* --- Leaderboard UI --- */
        .lb-hero {
            text-align: center;
            margin-bottom: 60px;
        }

        .lb-hero h1 {
            font-size: 4rem;
            margin-bottom: 12px;
        }

        .lb-hero p {
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .track-tabs-row {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }

        .track-tabs {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 100px;
            border: 1px solid var(--border-light);
        }

        .tab-btn {
            padding: 12px 28px;
            border-radius: 100px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .leaderboard-table th {
            text-align: left;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-light);
        }

        .leaderboard-table td {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-weight: 500;
        }

        .rank-text {
            font-weight: 900;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
        }

        .rank-1 .rank-text {
            color: var(--gold);
        }

        .rank-2 .rank-text {
            color: #C0C0C0;
        }

        .rank-3 .rank-text {
            color: #CD7F32;
        }

        .lb-actions {
            margin-top: 60px;
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .btn {
            padding: 16px 36px;
            border-radius: 100px;
            font-weight: 700;
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary), #c0392b);
            color: #fff;
            box-shadow: 0 10px 30px rgba(255, 70, 85, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.05);
        }

        .btn-clear {
            background: transparent;
            border: 1px solid rgba(255, 70, 85, 0.3);
            color: var(--secondary);
        }

        .btn-clear:hover {
            background: rgba(255, 70, 85, 0.1);
            border-color: var(--secondary);
        }

        /* Reveal Animations */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        footer {
            padding: 80px 0;
            text-align: center;
            border-top: 1px solid var(--border-light);
            margin-top: 100px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="blob-container">
        <div class="blob"></div>
    </div>

    <!-- Header -->
    <header>
        <div class="container" style="width: 100%;">
            <nav>
                <a href="index.html" class="logo font-heading">
                    <span style="font-size: 2rem;">🏎️</span> TurboRush
                </a>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="index.html#features">Features</a>
                    <a href="index.html#pricing">Pricing</a>
                </div>
                <a href="game.html" class="btn btn-primary"
                    style="padding: 10px 24px; font-size: 0.85rem; box-shadow: none;">Play Now</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="lb-hero reveal active">
            <h1 class="font-heading">🏆 Global Leaderboard</h1>
            <p>The fastest drivers in the TurboRush universe.</p>
        </div>

        <div class="lb-wrap reveal active">
            <div class="track-tabs-row">
                <div id="track-tabs" class="track-tabs"></div>
            </div>

            <div class="glass-card">
                <div id="lb-container"></div>
            </div>

            <div class="lb-actions">
                <a href="game.html" class="btn btn-primary">🏁 Race to Claim #1</a>
                <button onclick="if(confirm('Clear all scores?')) { clearLeaderboard(); location.reload(); }"
                    class="btn btn-clear">🗑️ Clear Local Scores</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 TurboRush SaaS. No download required.</p>
    </footer>

    <script src="js/leaderboard.js"></script>
    <script src="js/tracks.js"></script>
    <script>
        // Initialize tabs from TRACKS array
        window.addEventListener('DOMContentLoaded', () => {
            TRACKS.forEach((t, idx) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
                btn.textContent = t.thumbnail + ' ' + t.name;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderLeaderboardTable('lb-container', t.id);
                });
                document.getElementById('track-tabs').appendChild(btn);
            });
            renderLeaderboardTable('lb-container', 0);
        });

        // Simple reveal animation
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>

</html>
