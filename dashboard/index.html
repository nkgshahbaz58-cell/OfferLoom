<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboRush — Dashboard</title>
    <meta name="description" content="TurboRush racing dashboard. View global leaderboards and track records.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;900&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="apple-touch-icon" href="../assets/favicon.png">
    <style>
        :root {
            --p: #00D4FF;
            --s: #FF4655;
            --a: #A259FF;
            --bg: #02020a;
            --card: rgba(255, 255, 255, .03);
            --glass: rgba(5, 5, 20, .85);
            --t: #fff;
            --tm: #8888a8;
            --b: rgba(255, 255, 255, .08);
            --r: 24px;
            --tr: all .4s cubic-bezier(.165, .84, .44, 1)
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth;
            background: var(--bg)
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--t);
            line-height: 1.6;
            overflow-x: hidden;
            padding-top: 100px
        }

        h1,
        h2,
        h3,
        .fh {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            letter-spacing: -.02em
        }

        /* Blobs */
        .blobs {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none
        }

        .bl {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .35
        }

        .bl-1 {
            top: -200px;
            left: -100px;
            background: radial-gradient(circle, rgba(0, 212, 255, .4), transparent 70%);
            animation: mv 20s infinite alternate
        }

        .bl-2 {
            bottom: -200px;
            right: -100px;
            background: radial-gradient(circle, rgba(162, 89, 255, .3), transparent 70%);
            animation: mv 25s infinite alternate-reverse
        }

        @keyframes mv {
            from {
                transform: translate(-10%, -10%)
            }

            to {
                transform: translate(10%, 10%)
            }
        }

        /* Nav */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--b);
            height: 80px;
            display: flex;
            align-items: center
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 32px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .nv {
            display: flex;
            gap: 32px
        }

        .nv a {
            text-decoration: none;
            color: var(--tm);
            font-weight: 500;
            transition: var(--tr)
        }

        .nv a:hover {
            color: #fff
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            border-radius: 100px;
            font-weight: 700;
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
            transition: var(--tr);
            cursor: pointer;
            border: none;
            font-size: .95rem
        }

        .bp {
            background: linear-gradient(135deg, var(--s), #c0392b);
            color: #fff;
            box-shadow: 0 10px 30px rgba(255, 70, 85, .3)
        }

        .bp:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 70, 85, .5)
        }

        .bs {
            background: rgba(255, 255, 255, .05);
            color: #fff;
            border: 1px solid var(--b)
        }

        .bs:hover {
            background: rgba(255, 255, 255, .1);
            border-color: #fff
        }

        /* Container */
        .ct {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 32px
        }

        /* Page Hero */
        .hero {
            text-align: center;
            margin-bottom: 60px
        }

        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin-bottom: 12px
        }

        .hero p {
            color: var(--tm);
            font-size: 1.15rem
        }

        /* Stats Cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 60px
        }

        .stat-card {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--b);
            border-radius: var(--r);
            padding: 28px;
            text-align: center;
            transition: var(--tr)
        }

        .stat-card:hover {
            border-color: rgba(255, 255, 255, .2);
            transform: translateY(-4px)
        }

        .stat-val {
            font-size: 2.5rem;
            font-weight: 900;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 8px
        }

        .stat-label {
            color: var(--tm);
            font-size: .85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px
        }

        /* Tabs */
        .tabs-row {
            margin-bottom: 40px;
            display: flex;
            justify-content: center
        }

        .tabs {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, .04);
            padding: 6px;
            border-radius: 100px;
            border: 1px solid var(--b);
            flex-wrap: wrap;
            justify-content: center
        }

        .tab-btn {
            padding: 10px 22px;
            border-radius: 100px;
            border: none;
            background: transparent;
            color: var(--tm);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: var(--tr);
            font-size: .85rem
        }

        .tab-btn.active {
            background: var(--p);
            color: #000;
            box-shadow: 0 4px 12px rgba(0, 212, 255, .4)
        }

        /* Leaderboard Table */
        .lb-box {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--b);
            border-radius: var(--r);
            overflow: hidden;
            margin-bottom: 40px
        }

        .lb-table {
            width: 100%;
            border-collapse: collapse
        }

        .lb-table thead tr {
            background: rgba(255, 255, 255, .02)
        }

        .lb-table th {
            text-align: left;
            padding: 18px 24px;
            color: var(--tm);
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid var(--b)
        }

        .lb-table td {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, .03);
            font-weight: 500
        }

        .lb-table tr:last-child td {
            border-bottom: none
        }

        .lb-table tr:hover {
            background: rgba(255, 255, 255, .02)
        }

        .lb-table tr.first td:first-child {
            color: #FFD700;
            font-weight: 900;
            font-size: 1.2rem
        }

        .lb-table tr.second td:first-child {
            color: #C0C0C0;
            font-weight: 900;
            font-size: 1.1rem
        }

        .lb-table tr.third td:first-child {
            color: #CD7F32;
            font-weight: 900;
            font-size: 1.1rem
        }

        .time-cell {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: var(--p)
        }

        .no-scores {
            color: var(--tm);
            text-align: center;
            padding: 60px 20px;
            font-size: 1.1rem
        }

        /* Actions */
        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap
        }

        .bcl {
            background: transparent;
            border: 1px solid rgba(255, 70, 85, .3);
            color: var(--s);
            padding: 12px 24px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--tr);
            font-size: .9rem
        }

        .bcl:hover {
            background: rgba(255, 70, 85, .1);
            border-color: var(--s)
        }

        /* Footer */
        footer {
            padding: 80px 0 40px;
            text-align: center;
            border-top: 1px solid var(--b);
            margin-top: 80px;
            color: var(--tm);
            font-size: .85rem
        }

        /* Reveal */
        .rv {
            opacity: 0;
            transform: translateY(30px);
            transition: all .8s ease-out
        }

        .rv.on {
            opacity: 1;
            transform: translateY(0)
        }

        @media(max-width:600px) {
            .stats {
                grid-template-columns: 1fr 1fr
            }

            .hero h1 {
                font-size: 2rem
            }

            .nv {
                gap: 16px
            }

            nav {
                padding: 0 16px
            }
        }
    </style>
</head>

<body>

    <div class="blobs">
        <div class="bl bl-1"></div>
        <div class="bl bl-2"></div>
    </div>

    <header>
        <nav>
            <a href="../" class="logo"><span style="font-size:1.8rem">🏎️</span> TurboRush</a>
            <div class="nv">
                <a href="../">Home</a>
                <a href="../game/">Play</a>
            </div>
            <a href="../game/" class="btn bp" style="padding:10px 24px;font-size:.85rem">Race Now</a>
        </nav>
    </header>

    <div class="ct">
        <div class="hero rv on">
            <h1 class="fh">🏆 Racing Dashboard</h1>
            <p>Track records, leaderboards, and player statistics.</p>
        </div>

        <div class="stats rv on" id="stats-cards">
            <div class="stat-card">
                <div class="stat-val" id="stat-total" style="color:var(--p)">0</div>
                <div class="stat-label">Total Races</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="stat-players" style="color:var(--a)">0</div>
                <div class="stat-label">Players</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="stat-best" style="color:#FFD700">--</div>
                <div class="stat-label">Best Time</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="stat-tracks" style="color:var(--s)">3</div>
                <div class="stat-label">Tracks</div>
            </div>
        </div>

        <div class="rv on">
            <div class="tabs-row">
                <div id="track-tabs" class="tabs"></div>
            </div>
            <div class="lb-box">
                <div id="lb-container"></div>
            </div>
        </div>

        <div class="actions rv on">
            <a href="../game/" class="btn bp">🏁 Race to Claim #1</a>
            <button onclick="if(confirm('Clear all saved scores?')){clearLeaderboard();location.reload()}"
                class="btn bcl">🗑️ Clear Local Scores</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 TurboRush SaaS. No download required.</p>
    </footer>

    <script src="../js/leaderboard.js"></script>
    <script src="../js/tracks.js"></script>
    <script>
        // Build tabs
        window.addEventListener('DOMContentLoaded', () => {
            TRACKS.forEach((t, idx) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
                btn.textContent = t.thumbnail + ' ' + t.name;
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderLeaderboardTable('lb-container', t.id);
                    updateStats(t.id);
                });
                document.getElementById('track-tabs').appendChild(btn);
            });
            renderLeaderboardTable('lb-container', 0);
            updateStats(0);

            // Reveal animation
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('on'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.rv').forEach(el => obs.observe(el));
        });

        function updateStats(trackId) {
            const lb = getLeaderboard();
            let totalRaces = 0;
            let allPlayers = new Set();
            let bestTime = Infinity;

            Object.values(lb).forEach(entries => {
                totalRaces += entries.length;
                entries.forEach(e => {
                    allPlayers.add(e.name);
                    if (e.time < bestTime) bestTime = e.time;
                });
            });

            document.getElementById('stat-total').textContent = totalRaces;
            document.getElementById('stat-players').textContent = allPlayers.size;
            document.getElementById('stat-best').textContent = bestTime < Infinity ? formatTime(bestTime) : '--';
            document.getElementById('stat-tracks').textContent = TRACKS.length;
        }
    </script>
</body>

</html>
